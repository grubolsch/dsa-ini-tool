# DSA INI tool — single-domain Nginx config for Laravel Forge.
#
# In Forge: Site → "Edit Files" → "Edit Nginx Configuration". KEEP the Forge-managed
# lines (the `server {`, `listen ... ssl`, `server_name`, `ssl_certificate*`, and the
# `# FORGE CONFIG (DO NOT REMOVE!)` include block). REPLACE the `root`, `index`, and the
# default `location /` / `location ~ \.php$` blocks with the ones below.
#
# Replace DOMAIN and the PHP version (php8.4) to match your server.
#
# Result: Nginx serves the built React SPA, and proxies /api, /uploads and
# /.well-known/mercure to Symfony (PHP-FPM) + the Mercure daemon on the same box.
# Single origin => no CORS, same-origin SSE.

    # --- serve the built React SPA ---
    root /home/forge/DOMAIN/frontend/dist;
    index index.html;
    charset utf-8;
    client_max_body_size 16M;

    # Uploaded images live under Symfony's public/uploads
    location ^~ /uploads/ {
        alias /home/forge/DOMAIN/backend/public/uploads/;
        try_files $uri =404;
        access_log off;
        expires 7d;
    }

    # Mercure hub (Server-Sent Events) -> self-hosted daemon on 127.0.0.1:3000
    location /.well-known/mercure {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        chunked_transfer_encoding off;
    }

    # Symfony API — front controller is at backend/public/index.php
    location ^~ /api {
        try_files $uri @symfony;
    }
    location @symfony {
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /home/forge/DOMAIN/backend/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param DOCUMENT_ROOT /home/forge/DOMAIN/backend/public;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_read_timeout 60;
    }

    # React SPA + client-side routing fallback (/, /run/:code, /play/:code, …)
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location ~ /\.(?!well-known).* { deny all; }
