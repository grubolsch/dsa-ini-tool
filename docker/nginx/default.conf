server {
    listen 80;
    server_name _;
    root /var/www/html/public;

    client_max_body_size 16m;

    # Serve uploaded files directly from the filesystem.
    location /uploads/ {
        try_files $uri =404;
    }

    # Mercure hub (SSE) — proxied to the mercure container.
    # Use Docker's embedded DNS (127.0.0.11) + a variable upstream so nginx does
    # NOT resolve "mercure" at startup (which makes it crash if mercure is briefly
    # unavailable). Resolution is deferred to request time instead.
    resolver 127.0.0.11 valid=10s ipv6=off;
    location /.well-known/mercure {
        set $mercure_upstream http://mercure:80;
        proxy_pass $mercure_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        chunked_transfer_encoding off;
    }

    # Symfony front controller.
    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        internal;
    }

    # Return 404 for all other .php files (only index.php is a front controller).
    location ~ \.php$ {
        return 404;
    }

    error_log /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}
