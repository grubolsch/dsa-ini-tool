# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

parameters:
    app.uploads_dir: '%kernel.project_dir%/public/uploads'
    app.uploads_public_path: '/uploads'
    app.gallery_dir: '%kernel.project_dir%/public/gallery'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        bind:
            string $uploadsDir: '%app.uploads_dir%'
            string $uploadsPublicPath: '%app.uploads_public_path%'
            string $galleryDir: '%app.gallery_dir%'

    # makes classes in src/ available to be used as services
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

when@test:
    services:
        _defaults:
            autowire: true
            autoconfigure: true
            bind:
                string $uploadsDir: '%app.uploads_dir%'
                string $uploadsPublicPath: '%app.uploads_public_path%'
                string $galleryDir: '%app.gallery_dir%'
                # In tests there is no real Mercure hub; disable publishing entirely.
                bool $enabled: false

        App\:
            resource: '../src/'
            exclude:
                - '../src/DependencyInjection/'
                - '../src/Entity/'
                - '../src/Kernel.php'
