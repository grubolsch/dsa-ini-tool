framework:
    secret: '%env(APP_SECRET)%'
    http_method_override: false
    handle_all_throwables: true

    # Session disabled — stateless JSON API, no auth.
    session: false

    php_errors:
        log: true

    serializer:
        enable_attributes: true

    uid:
        default_uuid_version: 7

when@test:
    framework:
        test: true
