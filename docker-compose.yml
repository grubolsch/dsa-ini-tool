services:
  php:
    build:
      context: ./docker/php
    volumes:
      - ./backend:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: "mysql://app:app@mysql:3306/turntracker?serverVersion=8.0"
      APP_ENV: dev
      MERCURE_URL: "http://mercure/.well-known/mercure"
      MERCURE_PUBLIC_URL: "http://localhost:8080/.well-known/mercure"
      MERCURE_JWT_SECRET: "!ChangeThisMercureHubJWTSecretKey!"

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
      - mercure

  mysql:
    image: mysql:8
    ports:
      # Host-side 3307 to avoid clashing with a local MySQL on 3306.
      # Containers still reach MySQL via the internal network as mysql:3306.
      - "3307:3306"
    environment:
      MYSQL_DATABASE: turntracker
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  mercure:
    image: dunglas/mercure
    ports:
      - "8081:80"
    environment:
      SERVER_NAME: ":80"
      GLOBAL_OPTIONS: "auto_https off"
      MERCURE_PUBLISHER_JWT_KEY: "!ChangeThisMercureHubJWTSecretKey!"
      MERCURE_SUBSCRIBER_JWT_KEY: "!ChangeThisMercureHubJWTSecretKey!"
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins http://localhost:5173 http://localhost:8080
        anonymous

  node:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      VITE_MERCURE_URL: "http://localhost:8080/.well-known/mercure"
      # Base URL encoded in the player-join QR code. Leave unset to use the
      # browser's origin; set to your machine's LAN address so phones can reach
      # it, e.g. "http://192.168.1.20:5173" (no trailing /play). See README.
      # VITE_PLAYER_BASE_URL: "http://192.168.1.20:5173"

volumes:
  mysql_data:
